services:
  bingo:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env.local
    volumes:
      # Optional: mount server-providers.yml for provider config
      # - ./server-providers.yml:/app/server-providers.yml:ro
      - bingo-data:/app/data
    restart: unless-stopped

volumes:
  bingo-data:
