<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BinGO</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, "Microsoft YaHei", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #eef2ff; background: radial-gradient(circle at 50% 25%, #243b72, #0b1020 58%); }
      main { width: min(520px, calc(100vw - 48px)); padding: 42px; text-align: center; border: 1px solid #ffffff20; border-radius: 24px; background: #11182dcc; box-shadow: 0 24px 80px #0008; backdrop-filter: blur(18px); }
      h1 { margin: 0 0 10px; font-size: 42px; letter-spacing: .04em; }
      p { margin: 0; color: #b9c4df; line-height: 1.7; }
      .spinner { width: 42px; height: 42px; margin: 28px auto; border: 4px solid #ffffff25; border-top-color: #7aa2ff; border-radius: 50%; animation: spin 1s linear infinite; }
      #error { display: none; margin-top: 22px; color: #ffb4b4; white-space: pre-wrap; }
      button { display: none; margin: 20px auto 0; padding: 10px 18px; color: white; border: 0; border-radius: 10px; background: #4776e6; cursor: pointer; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <main>
      <h1>BinGO</h1>
      <p id="status">正在启动本地教学服务，请稍候…</p>
      <div class="spinner" id="spinner"></div>
      <p id="error"></p>
      <button id="retry">重试</button>
    </main>
    <script>
      const { invoke } = window.__TAURI__.core;
      const status = document.querySelector('#status');
      const error = document.querySelector('#error');
      const spinner = document.querySelector('#spinner');
      const retry = document.querySelector('#retry');
      async function start() {
        status.textContent = '正在启动本地教学服务，请稍候…';
        error.style.display = 'none'; retry.style.display = 'none'; spinner.style.display = 'block';
        try { await invoke('start_bingo_server'); }
        catch (reason) {
          status.textContent = 'BinGO 启动失败'; error.textContent = String(reason);
          error.style.display = 'block'; retry.style.display = 'block'; spinner.style.display = 'none';
        }
      }
      retry.addEventListener('click', start); start();
    </script>
  </body>
</html>
